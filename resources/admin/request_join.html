<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Join Control | Zone Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === MINIMALIST PURE BLACK THEME === */
    :root {
        --bg-color: #000000;
        --sidebar-bg: #050505;
        --card-bg: #0a0a0a;
        --text-main: #ffffff;
        --text-muted: #888888;
        --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        --accent-approve: #10b981; /* Minimalist Green */
        --accent-decline: #ef4444; /* Minimalist Red */
        --sidebar-width: 280px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* =========================================
       TOP NAV & SIDEBAR STYLES (ZERO LAG)
       ========================================= */
    .top-nav { width: 100%; padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; background: rgba(0, 0, 0, 0.9); border-bottom: var(--glass-border); }
    .menu-trigger { font-size: 20px; cursor: pointer; color: var(--text-main); padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .menu-trigger:hover { background: rgba(255,255,255,0.1); }
    .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 18px; text-transform: uppercase; color: var(--text-main); }

    .sidebar { 
        position: fixed; top: 0; left: 0; transform: translate3d(-100%, 0, 0); width: var(--sidebar-width); height: 100%; 
        background: var(--sidebar-bg); border-right: 1px solid #1a1a1a; z-index: 1001; transition: transform 0.25s ease-out; 
        padding: 40px 20px; will-change: transform; 
    }
    .sidebar.active { transform: translate3d(0, 0, 0); }
    
    .sidebar-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; 
        opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; will-change: opacity; 
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

    .nav-btn { width: 100%; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; font-size: 15px; font-weight: 500; text-decoration: none; }
    .nav-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); transform: translate3d(4px, 0, 0); }
    .nav-btn.active { background: linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent); color: var(--text-main); border-left: 3px solid var(--text-main); border-radius: 0 10px 10px 0; }
    .nav-btn i { font-size: 16px; width: 20px; text-align: center; }

    /* =========================================
       MAIN CONTENT WRAPPER
       ========================================= */
    .main-content {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; width: 100%; max-width: 1100px; margin: 0 auto;
      animation: slideUp 0.5s ease-out forwards; 
    }
    
    @keyframes slideUp { 
        from { opacity: 0; transform: translate3d(0, 20px, 0); } 
        to { opacity: 1; transform: translate3d(0, 0, 0); } 
    }

    header { text-align: center; margin-bottom: 40px; width: 100%; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    p.subtitle { color: var(--text-muted); font-size: 16px; word-wrap: break-word; }

    /* Layout Grids */
    .requests-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%;
    }

    /* Minimalist Dark Cards */
    .request-card {
      background: var(--card-bg); border: var(--glass-border); border-radius: 20px; padding: 24px;
      transition: transform 0.2s; position: relative; overflow: hidden;
    }
    .request-card:hover { transform: translate3d(0, -3px, 0); border-color: rgba(255,255,255,0.2); }

    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px;
      font-weight: 600; background: rgba(255, 255, 255, 0.1); color: var(--text-main); margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .info-row { margin-bottom: 12px; font-size: 14px; }
    .info-row span.label { color: var(--text-muted); display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;}
    .info-row span.value { color: var(--text-main); font-weight: 500; word-break: break-all; }

    /* Buttons */
    .btn-group { display: flex; gap: 10px; margin-top: 24px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-approve { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent-approve); color: var(--accent-approve); }
    .btn-approve:hover { background: var(--accent-approve); color: #000; }
    
    .btn-decline { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-decline); color: var(--accent-decline); }
    .btn-decline:hover { background: var(--accent-decline); color: #fff; }
    
    .btn-cancel { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
    .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }

    /* Empty States */
    .empty-state { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 40px; }
    .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }
    .error-text { color: var(--accent-decline); margin-top: 10px; }

    /* Modal Styles - Lag Free */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); /* Removed laggy blur */
      display: flex; justify-content: center; align-items: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; padding: 20px;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--sidebar-bg); border: 1px solid #1a1a1a; border-radius: 24px; padding: 35px 30px; 
      width: 100%; max-width: 400px; text-align: center; transform: translate3d(0, 15px, 0); 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-card { transform: translate3d(0, 0, 0); }
    
    .modal-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
    .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
    .modal-text { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; line-height: 1.5; }

    /* Mobile */
    @media (max-width: 600px) {
      .main-content { padding: 30px 15px; }
      h1 { font-size: 26px; }
      .requests-grid { grid-template-columns: 1fr; gap: 16px; }
      .request-card { padding: 20px; }
      .btn-group { flex-direction: column; gap: 12px; }
      .btn { padding: 16px; } 
      .modal-card { padding: 30px 20px; }
      .sidebar { width: 85%; }
    }
  </style>
</head>
<body>
  
  <div id="root" style="width: 100%;"></div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAs2S6iRhnYhmqNuF0QCCYu5NuzxHxIRv0",
      authDomain: "tvnstream-b4497.firebaseapp.com",
      databaseURL: "https://tvnstream-b4497-default-rtdb.firebaseio.com",
      projectId: "tvnstream-b4497",
      storageBucket: "tvnstream-b4497.appspot.com",
      messagingSenderId: "308384754214",
      appId: "1:308384754214:web:2938e76cd29b288f75d4e7"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getDatabase(app);
    window.auth = getAuth(app);
    window.fbRef = ref;
    window.fbOnValue = onValue;
    window.fbUpdate = update;
    window.fbSet = set; 
    window.fbOnAuthStateChanged = onAuthStateChanged;

    window.firebaseIsReady = true;
    if (typeof window.mountReactApp === 'function') {
      window.mountReactApp();
    }
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    function AdminDashboard() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [user, setUser] = useState(null);
      const [requests, setRequests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [modal, setModal] = useState({
        isOpen: false,
        uid: null,
        status: null,
        processing: false
      });

      useEffect(() => {
        const unsubscribe = window.fbOnAuthStateChanged(window.auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            loadRequests();
          } else {
            setUser(null);
            setLoading(false);
          }
        });
        return () => unsubscribe();
      }, []);

      const loadRequests = () => {
        const reqRef = window.fbRef(window.db, "joinRequests");
        window.fbOnValue(reqRef, (snapshot) => {
          const data = snapshot.val();
          if (data) {
            const pendingReqs = Object.entries(data)
              .map(([uid, req]) => ({ uid, ...req }))
              .filter(req => req.status === "pending");
            setRequests(pendingReqs);
          } else {
            setRequests([]);
          }
          setLoading(false);
          setError(null);
        }, (err) => {
          console.error("Firebase Error:", err);
          setError("Permission Denied. Your UID is not authorized as an Admin in the Firebase Rules.");
          setLoading(false);
        });
      };

      const openModal = (uid, status) => {
        setModal({ isOpen: true, uid, status, processing: false });
      };

      const closeModal = () => {
        if (!modal.processing) {
          setModal({ ...modal, isOpen: false });
        }
      };

      const confirmAction = async () => {
        setModal({ ...modal, processing: true });
        
        const requestData = requests.find(r => r.uid === modal.uid);
        if (!requestData) {
            alert("Request data not found!");
            setModal({ ...modal, processing: false });
            return;
        }

        try {
            if (modal.status === 'approved') {
                const accessID = Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
                
                const userRef = window.fbRef(window.db, `users/${modal.uid}`);
                await window.fbUpdate(userRef, {
                    telegramUsername: requestData.telegramUsername || "Unknown",
                    name: requestData.name || requestData.telegramUsername || "Unknown",
                    email: requestData.email || "No Email",
                    bio: "No bio set.",
                    status: "approved",
                    role: "user",
                    accessID: accessID
                });

                const reqRef = window.fbRef(window.db, `joinRequests/${modal.uid}`);
                await window.fbSet(reqRef, null); 
                
            } else {
                const requestRef = window.fbRef(window.db, `joinRequests/${modal.uid}`);
                await window.fbUpdate(requestRef, { status: modal.status });
            }
            
            closeModal();
            
        } catch (err) {
            console.error("Error updating status:", err);
            alert("Error: Permission Denied. Check the console.");
            setModal({ ...modal, processing: false });
        }
      };

      return (
        <React.Fragment>
          {/* === HEADER / TOP NAV === */}
          <nav className="top-nav">
            <div className="menu-trigger" onClick={() => setSidebarOpen(true)}>
              <i className="fas fa-bars-staggered"></i>
            </div>
            <div className="logo">ZONE VAULT</div>
            <div style={{width: '36px'}}></div>
          </nav>

          {/* === SIDEBAR === */}
          <div className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <aside className={`sidebar ${sidebarOpen ? 'active' : ''}`}>
            <div style={{ marginBottom: '40px', paddingLeft: '15px' }}>
              <h3 style={{ fontSize: '20px', fontWeight: '700', color: '#fff' }}>Admin Panel</h3>
              <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: 0 }}>Management Suite</p>
            </div>

            <a href="panel" className="nav-btn">
              <i className="fas fa-house"></i>
              <span>Admin Home</span>
            </a>

            <a href="upload" className="nav-btn"> 
              <i className="fas fa-cloud-arrow-up"></i>
              <span>Upload Video</span>
            </a>

            <a href="request_join" className="nav-btn active">
              <i className="fas fa-user-plus"></i>
              <span>Request Join</span>
            </a>

            <a href="notif" className="nav-btn">
              <i className="fas fa-bullhorn"></i>
              <span>Notifications</span>
            </a>

            <a href="generator" className="nav-btn">
              <i className="fas fa-key"></i>
              <span>Access Codes</span>
            </a>

            <a href="page_access" className="nav-btn">
              <i className="fas fa-shield-halved"></i>
              <span>Page Access</span>
            </a>

            <a href="watch_history" className="nav-btn">
              <i className="fas fa-history"></i>
              <span>Watch History</span>
            </a>
                
            <a href="user_directory" className="nav-btn">
              <i className="fas fa-address-book"></i>
              <span>User Directory</span>
            </a>
          </aside>

          {/* === MAIN CONTENT === */}
          <main className="main-content">
            <header>
              <p className="subtitle">
                {user ? (
                  <span>Logged in as Admin: <strong>{user.email}</strong></span>
                ) : (
                  "Review pending access requests to Zone Vault"
                )}
              </p>
            </header>

            <div className="requests-grid">
              {!user && !loading && (
                <div className="empty-state">
                  <i className="fas fa-lock"></i>
                  <p>You must be logged in to view this page.</p>
                  <p className="error-text">Please go back to the Register/Login page and sign in first.</p>
                </div>
              )}

              {user && loading && (
                <div className="empty-state">
                  <i className="fas fa-spinner fa-spin"></i>
                  <p>Authenticating & Loading requests...</p>
                </div>
              )}

              {error && (
                <div className="empty-state">
                  <i className="fas fa-exclamation-triangle" style={{ color: 'var(--accent-decline)' }}></i>
                  <p>Access Blocked</p>
                  <p className="error-text">{error}</p>
                </div>
              )}

              {user && !loading && !error && requests.length === 0 && (
                <div className="empty-state">
                  <i className="fas fa-check-circle" style={{ color: 'var(--accent-approve)' }}></i>
                  <p>All caught up! No pending requests right now.</p>
                </div>
              )}

              {user && !loading && !error && requests.map(req => (
                <div key={req.uid} className="request-card">
                  <div className="badge"><i className="fas fa-hourglass-half" style={{marginRight: '5px'}}></i> Pending</div>
                  
                  <div className="info-row">
                    <span className="label">Telegram Username / Name</span>
                    <span className="value">
                      <i className="fab fa-telegram-plane" style={{ marginRight: '5px', color: 'var(--text-muted)' }}></i>
                      {req.telegramUsername || req.name || 'N/A'}
                    </span>
                  </div>
                  
                  <div className="info-row">
                    <span className="label">Email Address</span>
                    <span className="value">{req.email}</span>
                  </div>

                  <div className="info-row">
                    <span className="label">Access Code / Reason</span>
                    <span className="value">
                      <i className="fas fa-key" style={{ marginRight: '5px', color: 'var(--text-muted)' }}></i>
                      {req.providedCode || req.reason || 'N/A'}
                    </span>
                  </div>

                  <div className="info-row" style={{ marginTop: '15px', borderTop: '1px solid rgba(255,255,255,0.05)', paddingTop: '10px' }}>
                    <span className="label">User ID (UID)</span>
                    <span className="value" style={{ fontSize: '11px', fontFamily: 'monospace', color: 'var(--text-muted)' }}>
                      {req.uid}
                    </span>
                  </div>

                  <div className="btn-group">
                    <button className="btn btn-decline" onClick={() => openModal(req.uid, 'denied')}>
                      <i className="fas fa-times"></i> Decline
                    </button>
                    <button className="btn btn-approve" onClick={() => openModal(req.uid, 'approved')}>
                      <i className="fas fa-check"></i> Approve
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* === MODAL === */}
          <div className={`modal-overlay ${modal.isOpen ? 'active' : ''}`}>
            <div className="modal-card">
              <i 
                className={`modal-icon ${modal.status === 'approved' ? 'fas fa-check-circle' : 'fas fa-times-circle'}`} 
                style={{ color: modal.status === 'approved' ? 'var(--accent-approve)' : 'var(--accent-decline)' }}
              ></i>
              <h3 className="modal-title">
                {modal.status === 'approved' ? 'Approve Request' : 'Decline Request'}
              </h3>
              <p className="modal-text">
                {modal.status === 'approved' 
                  ? "Are you sure you want to grant this user access to the Vault?" 
                  : "Are you sure you want to deny this user's request?"}
              </p>
              
              <div className="btn-group">
                <button className="btn btn-cancel" onClick={closeModal} disabled={modal.processing}>Cancel</button>
                <button 
                  className={`btn ${modal.status === 'approved' ? 'btn-approve' : 'btn-decline'}`} 
                  onClick={confirmAction}
                  disabled={modal.processing}
                >
                  {modal.processing ? (
                    <React.Fragment><i className="fas fa-spinner fa-spin"></i> Processing...</React.Fragment>
                  ) : (
                    modal.status === 'approved' ? 'Yes, Approve' : 'Yes, Decline'
                  )}
                </button>
              </div>
            </div>
          </div>

        </React.Fragment>
      );
    }

    window.mountReactApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AdminDashboard />);
    };

    if (window.firebaseIsReady) {
      window.mountReactApp();
    }
  </script>

</body>
</html>
