<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Uploader | Zone Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === MINIMALIST PURE BLACK THEME === */
    :root {
        --bg-color: #000000;
        --sidebar-bg: #050505;
        --card-bg: #0a0a0a;
        --text-main: #ffffff;
        --text-muted: #888888;
        --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.03);
        --accent-approve: #10b981; 
        --accent-decline: #ef4444; 
        --sidebar-width: 280px; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === TOP NAV & SIDEBAR STYLES === */
    .top-nav { width: 100%; padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; background: rgba(0, 0, 0, 0.9); border-bottom: var(--glass-border); }
    .menu-trigger { font-size: 20px; cursor: pointer; color: var(--text-main); padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .menu-trigger:hover { background: rgba(255,255,255,0.1); }
    .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 18px; text-transform: uppercase; color: var(--text-main); }

    .sidebar { 
        position: fixed; top: 0; left: 0; transform: translate3d(-100%, 0, 0); width: var(--sidebar-width); height: 100%; 
        background: var(--sidebar-bg); border-right: 1px solid #1a1a1a; z-index: 1001; transition: transform 0.25s ease-out; 
        padding: 40px 20px; will-change: transform; 
    }
    .sidebar.active { transform: translate3d(0, 0, 0); }
    
    .sidebar-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; 
        opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; will-change: opacity; 
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

    .nav-btn { width: 100%; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; font-size: 15px; font-weight: 500; text-decoration: none; }
    .nav-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); transform: translate3d(4px, 0, 0); }
    .nav-btn.active { background: linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent); color: var(--text-main); border-left: 3px solid var(--text-main); border-radius: 0 10px 10px 0; }
    .nav-btn i { font-size: 16px; width: 20px; text-align: center; }

    /* === MAIN CONTENT === */
    .main-content {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; width: 100%; max-width: 800px; margin: 0 auto;
      animation: slideUp 0.5s ease-out forwards;
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translate3d(0, 20px, 0); } 
      to { opacity: 1; transform: translate3d(0, 0, 0); } 
    }

    header { position: relative; text-align: center; margin-bottom: 40px; width: 100%; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    p.subtitle { color: var(--text-muted); font-size: 16px; word-wrap: break-word; }

    .header-btn {
      position: absolute; top: 0; right: 0;
      background: rgba(255, 255, 255, 0.05); border: var(--glass-border);
      color: var(--text-main); width: 45px; height: 45px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; font-size: 16px; transition: all 0.2s ease;
    }
    .header-btn:hover { background: #ffffff; color: #000000; transform: scale(1.1); }

    /* === UPLOAD CARD === */
    .glass-card { background: var(--card-bg); border: var(--glass-border); border-radius: 20px; padding: 30px; width: 100%; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    
    .custom-input {
      width: 100%; padding: 14px 16px;
      background: var(--input-bg); border: var(--glass-border);
      border-radius: 12px; color: var(--text-main); font-size: 14px; outline: none; transition: 0.3s;
    }
    .custom-input:focus { border-color: #ffffff; }

    input[type="file"]::file-selector-button { background: rgba(255,255,255,0.1); color: #fff; border: var(--glass-border); padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 15px; font-family: 'Outfit'; transition: 0.2s; }
    input[type="file"]::file-selector-button:hover { background: #ffffff; color: #000; }

    .btn {
      width: 100%; padding: 14px; border-radius: 50px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #000000;
      background: #ffffff; transition: all 0.2s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn:hover { background: #cccccc; transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--text-muted); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }

    /* Progress UI */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; text-align: center; }
    .stat-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; border: var(--glass-border); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
    .stat-value { font-size: 16px; font-weight: 600; color: var(--text-main); }

    .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .progress-bar { height: 100%; width: 0%; background: #ffffff; transition: width 0.2s ease; border-radius: 10px; }
    .progress-status { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; color: var(--text-muted); }

    /* === MODAL FOR VIDEO LIBRARY === */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex; justify-content: center; align-items: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; padding: 20px;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--card-bg); border: 1px solid #1a1a1a;
      border-radius: 24px; padding: 30px; width: 100%; max-width: 700px; max-height: 90vh;
      display: flex; flex-direction: column;
      transform: translate3d(0, 15px, 0); 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-card { transform: translate3d(0, 0, 0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-size: 22px; font-weight: 700; color: var(--text-main); }
    .close-btn { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; transition: 0.2s; }
    .close-btn:hover { color: #fff; }

    .video-list { flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px; }
    .video-list::-webkit-scrollbar { width: 6px; }
    .video-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
    .video-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .video-item { 
      background: rgba(255,255,255,0.02); border: var(--glass-border); 
      border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative;
    }
    
    /* Delete Button inside Video Card */
    .btn-delete {
      position: absolute; top: 20px; right: 20px;
      background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--accent-decline); width: 35px; height: 35px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center;
    }
    .btn-delete:hover { background: var(--accent-decline); color: #fff; }

    .video-info-row { display: flex; gap: 15px; align-items: flex-start; padding-right: 40px; }
    .video-thumb { width: 120px; height: 70px; background: #000; border-radius: 8px; object-fit: cover; border: var(--glass-border); }
    .video-details { flex: 1; }
    .video-details h4 { font-size: 16px; margin-bottom: 5px; color: var(--text-main); word-break: break-all; }
    .video-details p { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
    
    .link-group { margin-top: 5px; }
    .link-group label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}
    .copy-box { display: flex; background: var(--input-bg); border: var(--glass-border); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .copy-box input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 10px 12px; font-family: monospace; font-size: 12px; outline: none; }
    .copy-box button { background: rgba(255,255,255,0.1); border: none; border-left: var(--glass-border); color: #fff; padding: 0 15px; cursor: pointer; transition: 0.2s; font-size: 12px; font-weight: 600; }
    .copy-box button:hover { background: #ffffff; color: #000; }

    .success-state { text-align: center; padding: 20px 0; }
    .success-state i { font-size: 48px; color: var(--accent-approve); margin-bottom: 15px; }
    
    /* Uniform Empty States for Auth */
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px; margin-top: 20px; font-style: normal; }
    .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; color: var(--text-muted); }
    .empty-state p { font-size: 16px; margin-bottom: 5px; }
    .error-text { color: var(--accent-decline); margin-top: 10px; font-weight: 500; }

    @media (max-width: 600px) {
      .main-content { padding: 30px 15px; }
      .sidebar { width: 85%; }
      .stats-grid { grid-template-columns: 1fr; gap: 10px; }
      .video-info-row { flex-direction: column; padding-right: 0; }
      .video-thumb { width: 100%; height: 160px; }
      .btn-delete { position: static; width: 100%; margin-top: 10px; }
    }
  </style>
</head>
<body>

  <div id="root" style="width: 100%;"></div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref as dbRef, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAs2S6iRhnYhmqNuF0QCCYu5NuzxHxIRv0",
      authDomain: "tvnstream-b4497.firebaseapp.com",
      databaseURL: "https://tvnstream-b4497-default-rtdb.firebaseio.com",
      projectId: "tvnstream-b4497",
      storageBucket: "tvnstream-b4497.firebasestorage.app",
      messagingSenderId: "308384754214",
      appId: "1:308384754214:web:2938e76cd29b288f75d4e7",
      measurementId: "G-VFNH70R4D9"
    };

    const app = initializeApp(firebaseConfig);
    
    // Assigning to window so React can access them easily
    window.db = getDatabase(app);
    window.auth = getAuth(app);
    
    window.fbDbRef = dbRef;
    window.fbPush = push;
    window.fbSet = set;
    window.fbOnValue = onValue;
    window.fbRemove = remove;
    window.fbOnAuthStateChanged = onAuthStateChanged;

    window.firebaseIsReady = true;
    if (typeof window.mountReactApp === 'function') window.mountReactApp();
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    function VideoUploaderApp() {
      // AUTHENTICATION STATES
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      const [usersError, setUsersError] = useState(null);

      // UI STATES
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [isLibraryOpen, setIsLibraryOpen] = useState(false);
      const [uploadState, setUploadState] = useState('idle');
      
      // FORM STATES
      const [title, setTitle] = useState('');
      const [file, setFile] = useState(null);
      
      // PROGRESS STATES
      const [progress, setProgress] = useState({
        percent: 0,
        loadedMB: "0.0",
        totalMB: "0.0",
        speed: "0.00",
        timeLeft: "Calculating...",
        statusText: "Connecting to server..."
      });

      const [videos, setVideos] = useState([]);
      const fileInputRef = useRef(null);

      // 1. AUTHENTICATION CHECKER
      useEffect(() => {
        const unsubscribeAuth = window.fbOnAuthStateChanged(window.auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const myProfileRef = window.fbDbRef(window.db, `users/${currentUser.uid}`);
            window.fbOnValue(myProfileRef, (snap) => {
              const myData = snap.val();
              if (myData && myData.role === 'admin') {
                setIsAdmin(true);
                setUsersError(null);
                
                // Fetch videos for library ONLY IF ADMIN
                const videosRef = window.fbDbRef(window.db, 'zonevault_videos');
                window.fbOnValue(videosRef, (snapshot) => {
                  const data = snapshot.val();
                  if (data) {
                    const videoList = Object.entries(data).map(([key, val]) => ({
                      id: key,
                      ...val
                    })).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setVideos(videoList);
                  } else {
                    setVideos([]);
                  }
                });
              } else {
                setIsAdmin(false);
                setUsersError(`Permission Denied: You do not have administrative privileges.`);
              }
              setAuthLoading(false);
            });
          } else {
            setAuthLoading(false);
            setIsAdmin(false);
            setVideos([]);
          }
        });
        return () => unsubscribeAuth();
      }, []);

      const handleFileChange = (e) => {
        if (e.target.files.length > 0) setFile(e.target.files[0]);
      };

      // 2.UPLOAD LOGIC
      const handleUpload = (e) => {
        e.preventDefault();
        if (!title || !file) return alert("Please provide a title and a video file.");
        
        setUploadState('uploading');
        
        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "https://anonmp4api.xyz/upload", true);

        let startTime = new Date().getTime();

        xhr.upload.onprogress = function(event) {
          if (event.lengthComputable) {
            const percentComplete = (event.loaded / event.total) * 100;
            
            let currentTime = new Date().getTime();
            let timeElapsedSeconds = (currentTime - startTime) / 1000;
            let loadedMB = event.loaded / (1024 * 1024);
            let totalMB = event.total / (1024 * 1024);
            
            let speedMBps = timeElapsedSeconds > 0 ? (loadedMB / timeElapsedSeconds) : 0;
            let remainingBytes = event.total - event.loaded;
            let remainingTimeSeconds = speedMBps > 0 ? (remainingBytes / (1024 * 1024)) / speedMBps : 0;

            let timeString = "Calculating...";
            if (percentComplete === 100) {
              timeString = "Processing...";
            } else if (remainingTimeSeconds > 0 && isFinite(remainingTimeSeconds)) {
              let h = Math.floor(remainingTimeSeconds / 3600);
              let m = Math.floor((remainingTimeSeconds % 3600) / 60);
              let s = Math.floor(remainingTimeSeconds % 60);
              
              timeString = "";
              if (h > 0) timeString += `${h}h `;
              if (m > 0 || h > 0) timeString += `${m}m `;
              timeString += `${s}s`;
            }

            setProgress({
              percent: percentComplete,
              loadedMB: loadedMB.toFixed(1),
              totalMB: totalMB.toFixed(1),
              speed: speedMBps.toFixed(2),
              timeLeft: timeString,
              statusText: percentComplete === 100 ? "Processing & saving to Database..." : "Uploading please wait..."
            });
          }
        };

        xhr.onload = async function() {
          if (xhr.status === 200) {
            try {
              const data = JSON.parse(xhr.responseText);
              if (!data.success) throw new Error(data.error?.message || "Upload failed.");

              setProgress(prev => ({...prev, statusText: 'Syncing to Database...'}));

              // Save to Firebase Database
              const videoRef = window.fbDbRef(window.db, 'zonevault_videos');
              const newVideoRef = window.fbPush(videoRef); 
              
              await window.fbSet(newVideoRef, {
                custom_title: title,
                video_id: data.video_id,
                filename: file.name,
                size_mb: (file.size / (1024 * 1024)).toFixed(2),
                watch_url: data.watch_url,
                embed_url: data.embed_url,
                thumbnail: data.thumbnail,
                timestamp: new Date().toISOString()
              });

              setUploadState('success');
            } catch (error) {
              alert("Error: " + error.message);
              setUploadState('idle');
            }
          } else {
            alert("Server Error: " + xhr.status);
            setUploadState('idle');
          }
        };

        xhr.onerror = function() {
          alert("Network Error occurred.");
          setUploadState('idle');
        };

        xhr.send(formData);
      };

      // 3. DELETE VIDEO LOGIC
      const handleDelete = (videoId) => {
        if(confirm("Are you sure you want to remove this video from your library?")) {
          const videoRef = window.fbDbRef(window.db, `zonevault_videos/${videoId}`);
          window.fbRemove(videoRef)
            .then(() => alert("Video removed successfully."))
            .catch(err => alert("Error deleting video: " + err.message));
        }
      };

      const resetUploader = () => {
        setTitle('');
        setFile(null);
        if (fileInputRef.current) fileInputRef.current.value = "";
        setUploadState('idle');
        setProgress({ percent: 0, loadedMB: "0.0", totalMB: "0.0", speed: "0.00", timeLeft: "Calculating...", statusText: "Connecting..." });
      };

      const copyToClipboard = (text, e) => {
        navigator.clipboard.writeText(text).then(() => {
          const btn = e.target;
          const originalText = btn.innerText;
          btn.innerText = "Copied!";
          btn.style.background = "var(--accent-approve)";
          btn.style.color = "#000";
          setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "rgba(255,255,255,0.1)";
            btn.style.color = "#fff";
          }, 2000);
        });
      };

      return (
        <React.Fragment>
          {/* === HEADER / TOP NAV === */}
          <nav className="top-nav">
            <div className="menu-trigger" onClick={() => setSidebarOpen(true)}>
              <i className="fas fa-bars-staggered"></i>
            </div>
            <div className="logo">ZONE VAULT</div>
            <div style={{width: '36px'}}></div>
          </nav>

          {/* === EXACT SIDEBAR AS PAGE ACCESS PANEL === */}
          <div className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <aside className={`sidebar ${sidebarOpen ? 'active' : ''}`}>
            <div style={{ marginBottom: '40px', paddingLeft: '15px' }}>
              <h3 style={{ fontSize: '20px', fontWeight: '700', color: '#fff' }}>Admin Panel</h3>
              <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: 0 }}>Management Suite</p>
            </div>

            <a href="panel" className="nav-btn">
              <i className="fas fa-house"></i>
              <span>Admin Home</span>
            </a>
            
            <a href="upload" className="nav-btn active">
              <i className="fas fa-cloud-arrow-up"></i>
              <span>Upload Video</span>
            </a>

            <a href="request_join" className="nav-btn">
              <i className="fas fa-user-plus"></i>
              <span>Request Join</span>
            </a>

            <a href="notif" className="nav-btn">
              <i className="fas fa-bullhorn"></i>
              <span>Notifications</span>
            </a>

            <a href="generator" className="nav-btn">
              <i className="fas fa-key"></i>
              <span>Access Codes</span>
            </a>

            <a href="page_access" className="nav-btn">
              <i className="fas fa-shield-halved"></i>
              <span>Page Access</span>
            </a>

            <a href="watch_history" className="nav-btn">
              <i className="fas fa-history"></i>
              <span>Watch History</span>
            </a>
              
            <a href="user_directory" className="nav-btn">
              <i className="fas fa-address-book"></i>
              <span>User Directory</span>
            </a>
          </aside>

          {/* === MAIN CONTENT === */}
          <main className="main-content">
            <header>
              <p className="subtitle">
                {user && isAdmin ? (
                  <span>Logged in as Admin: <strong>{user.email}</strong></span>
                ) : (
                  "Secure Video Management"
                )}
              </p>
              
              {/* Library Button (Admins Only) */}
              {user && !authLoading && !usersError && isAdmin && (
                <button className="header-btn" onClick={() => setIsLibraryOpen(true)} title="View Uploaded Videos">
                  <i className="fas fa-video"></i>
                </button>
              )}
            </header>

            {/* EMPTY STATES FOR AUTHENTICATION */}
            {!user && !authLoading && (
              <div className="empty-state">
                <i className="fas fa-lock"></i>
                <p>You must be logged in to view this page.</p>
                <p className="error-text">Please go back to the Login page and sign in first.</p>
              </div>
            )}

            {user && authLoading && (
              <div className="empty-state">
                <i className="fas fa-spinner fa-spin"></i>
                <p>Authenticating & Loading data...</p>
              </div>
            )}

            {usersError && !authLoading && (
              <div className="empty-state">
                <i className="fas fa-exclamation-triangle" style={{ color: 'var(--accent-decline)' }}></i>
                <p>Access Blocked</p>
                <p className="error-text">{usersError}</p>
              </div>
            )}

            {/* UPLOADER INTERFACE (Admins Only) */}
            {user && !authLoading && !usersError && isAdmin && (
              <div className="glass-card">
                
                {uploadState === 'idle' && (
                  <form onSubmit={handleUpload}>
                    <div className="form-group">
                      <label>Video Title</label>
                      <input type="text" className="custom-input" placeholder="Enter a descriptive title..." 
                             value={title} onChange={(e) => setTitle(e.target.value)} required />
                    </div>

                    <div className="form-group">
                      <label>Media File</label>
                      <input type="file" className="custom-input" accept="video/*" 
                             ref={fileInputRef} onChange={handleFileChange} required />
                    </div>

                    <button type="submit" className="btn">
                      <i className="fas fa-cloud-arrow-up"></i> Start Secure Upload
                    </button>
                  </form>
                )}

                {uploadState === 'uploading' && (
                  <div>
                    <div className="stats-grid">
                      <div className="stat-box">
                        <span className="stat-label">Uploaded</span>
                        <span className="stat-value">{progress.loadedMB} / {progress.totalMB} MB</span>
                      </div>
                      <div className="stat-box">
                        <span className="stat-label">Speed</span>
                        <span className="stat-value">{progress.speed} MB/s</span>
                      </div>
                      <div className="stat-box">
                        <span className="stat-label">Time Left</span>
                        <span className="stat-value">{progress.timeLeft}</span>
                      </div>
                    </div>

                    <div className="progress-track">
                      <div className="progress-bar" style={{width: `${progress.percent}%`}}></div>
                    </div>
                    <div className="progress-status">
                      <span>{progress.statusText}</span>
                      <span style={{color: "var(--text-main)", fontWeight: 600}}>{Math.round(progress.percent)}%</span>
                    </div>
                  </div>
                )}

                {uploadState === 'success' && (
                  <div className="success-state">
                    <i className="fas fa-check-circle"></i>
                    <h3 style={{fontSize: '24px', marginBottom: '10px'}}>Upload Complete!</h3>
                    <p style={{color: 'var(--text-muted)', marginBottom: '30px'}}>Video has been successfully saved to AnonMP4 and your Database.</p>
                    
                    <button className="btn" onClick={() => setIsLibraryOpen(true)}>
                      <i className="fas fa-list"></i> View in Library
                    </button>
                    <button className="btn btn-outline" onClick={resetUploader}>
                      <i className="fas fa-plus"></i> Upload Another Video
                    </button>
                  </div>
                )}

              </div>
            )}
          </main>

          {/* === MODAL: VIDEO LIBRARY (WITH DELETE) === */}
          <div className={`modal-overlay ${isLibraryOpen ? 'active' : ''}`}>
             <div className="modal-card">
                <div className="modal-header">
                  <h3>Uploaded Videos</h3>
                  <button className="close-btn" onClick={() => setIsLibraryOpen(false)}>
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                
                <div className="video-list">
                  {videos.length === 0 ? (
                    <div style={{ textAlign: 'center', padding: '30px', color: 'var(--text-muted)' }}>
                      No videos uploaded yet.
                    </div>
                  ) : (
                    videos.map(vid => (
                      <div key={vid.id} className="video-item">
                        {/* DELETE BUTTON */}
                        <button className="btn-delete" onClick={() => handleDelete(vid.id)} title="Delete Video">
                          <i className="fas fa-trash"></i>
                        </button>

                        <div className="video-info-row">
                          <img src={vid.thumbnail || 'https://placehold.co/300x200/121212/333?text=Video'} alt="Thumb" className="video-thumb" />
                          <div className="video-details">
                            <h4>{vid.custom_title}</h4>
                            <p><strong>Size:</strong> {vid.size_mb} MB</p>
                            <p><strong>Filename:</strong> {vid.filename}</p>
                            <p><strong>Date:</strong> {new Date(vid.timestamp).toLocaleDateString()}</p>
                          </div>
                        </div>
                        
                        <div className="link-group">
                          <label>Watch Link</label>
                          <div className="copy-box">
                            <input type="text" readOnly value={vid.watch_url} />
                            <button onClick={(e) => copyToClipboard(vid.watch_url, e)}>Copy</button>
                          </div>
                        </div>

                        <div className="link-group">
                          <label>Embed Code</label>
                          <div className="copy-box">
                            <input type="text" readOnly value={`<iframe src="${vid.embed_url}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`} />
                            <button onClick={(e) => copyToClipboard(`<iframe src="${vid.embed_url}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`, e)}>Copy</button>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>

             </div>
          </div>

        </React.Fragment>
      );
    }

    window.mountReactApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<VideoUploaderApp />);
    };
    
    if (window.firebaseIsReady) window.mountReactApp();
  </script>
</body>
</html>
