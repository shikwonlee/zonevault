<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch History | Zone Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === MINIMALIST PURE BLACK THEME === */
    :root {
        --bg-color: #000000;
        --sidebar-bg: #050505;
        --card-bg: #0a0a0a;
        --text-main: #ffffff;
        --text-muted: #888888;
        --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.03);
        --accent-approve: #10b981; /* Minimalist Green */
        --accent-decline: #ef4444; /* Minimalist Red */
        --sidebar-width: 280px; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === TOP NAV & SIDEBAR STYLES (ZERO LAG) === */
    .top-nav { width: 100%; padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; background: rgba(0, 0, 0, 0.9); border-bottom: var(--glass-border); }
    .menu-trigger { font-size: 20px; cursor: pointer; color: var(--text-main); padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .menu-trigger:hover { background: rgba(255,255,255,0.1); }
    .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 18px; text-transform: uppercase; color: var(--text-main); }

    .sidebar { 
        position: fixed; top: 0; left: 0; transform: translate3d(-100%, 0, 0); width: var(--sidebar-width); height: 100%; 
        background: var(--sidebar-bg); border-right: 1px solid #1a1a1a; z-index: 1001; transition: transform 0.25s ease-out; 
        padding: 40px 20px; will-change: transform; 
    }
    .sidebar.active { transform: translate3d(0, 0, 0); }
    
    .sidebar-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; 
        opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; will-change: opacity; 
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

    .nav-btn { width: 100%; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; font-size: 15px; font-weight: 500; text-decoration: none; }
    .nav-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); transform: translate3d(4px, 0, 0); }
    .nav-btn.active { background: linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent); color: var(--text-main); border-left: 3px solid var(--text-main); border-radius: 0 10px 10px 0; }
    .nav-btn i { font-size: 16px; width: 20px; text-align: center; }

    /* === MAIN CONTENT === */
    .main-content {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; width: 100%; max-width: 1100px; margin: 0 auto;
      animation: slideUp 0.5s ease-out forwards;
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translate3d(0, 20px, 0); } 
      to { opacity: 1; transform: translate3d(0, 0, 0); } 
    }

    header { position: relative; text-align: center; margin-bottom: 30px; width: 100%; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    p.subtitle { color: var(--text-muted); font-size: 16px; word-wrap: break-word; margin-bottom: 15px; }

    /* Active Streams Pill */
    .active-count { 
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(16, 185, 129, 0.1); color: var(--accent-approve); 
        border: 1px solid rgba(16, 185, 129, 0.3); 
        padding: 6px 16px; border-radius: 50px; font-size: 14px; font-weight: 600;
    }

    /* Top Right Buttons */
    .btn-danger-top {
      position: absolute; top: 0; right: 0;
      background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);
      padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 600;
      transition: all 0.2s ease; display: flex; align-items: center; gap: 8px;
    }
    .btn-danger-top:hover { background: rgba(239, 68, 68, 0.1); color: var(--accent-decline); border-color: var(--accent-decline); transform: translate3d(0, -2px, 0); }

    /* === SCROLLABLE BOX CONTAINER === */
    .scroll-container {
      width: 100%;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.01);
      border: var(--glass-border);
      border-radius: 24px;
      padding: 20px;
    }

    .scroll-container::-webkit-scrollbar { width: 8px; }
    .scroll-container::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
    .scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .scroll-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* History Cards Layout */
    .history-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; width: 100%;
    }

    .user-history-card {
      background: var(--card-bg); border: var(--glass-border); border-radius: 20px;
      overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s;
    }
    .user-history-card:hover { transform: translate3d(0, -3px, 0); border-color: rgba(255,255,255,0.15); }

    .card-header {
      padding: 20px; border-bottom: var(--glass-border); background: rgba(255,255,255,0.02);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .user-ident { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .user-name { font-size: 18px; font-weight: 700; color: var(--text-main); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .user-email { font-size: 13px; color: var(--text-muted); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .user-uid { font-size: 11px; color: rgba(255,255,255,0.3); font-family: monospace; }
    
    .btn-delete-small {
      background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.2s;
      display: flex; justify-content: center; align-items: center; flex-shrink: 0;
    }
    .btn-delete-small:hover { background: rgba(239, 68, 68, 0.1); color: var(--accent-decline); border-color: var(--accent-decline); }

    .video-list { padding: 15px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    
    .video-item {
      display: flex; gap: 15px; padding: 10px; border-radius: 12px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
      align-items: center; position: relative;
    }
    .video-thumb {
      width: 80px; height: 50px; border-radius: 8px; object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
    }
    .video-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; flex: 1; }
    .video-title { font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .video-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
    
    .live-indicator {
      display: inline-flex; align-items: center; gap: 5px; color: var(--accent-approve); font-size: 11px; font-weight: bold;
    }
    .pulse-dot {
      width: 6px; height: 6px; background-color: var(--accent-approve); border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); animation: pulse 1.5s infinite;
      will-change: transform, box-shadow;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* === UNIFORM EMPTY STATES (No Box Background) === */
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px; margin-top: 20px; font-style: normal; }
    .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; color: var(--text-muted); }
    .empty-state p { font-size: 16px; margin-bottom: 5px; }
    .error-text { color: var(--accent-decline); margin-top: 10px; font-weight: 500; }
    
    .empty-history { text-align: center; color: var(--text-muted); padding: 60px 20px; width: 100%; grid-column: 1/-1;}
    .empty-history i { font-size: 40px; margin-bottom: 15px; opacity: 0.3; }

    @media (max-width: 600px) {
      .main-content { padding: 30px 15px; }
      h1 { font-size: 26px; } 
      .history-grid { grid-template-columns: 1fr; }
      .btn-danger-top { position: relative; display: inline-flex; margin-top: 15px; }
      .scroll-container { max-height: 70vh; padding: 15px; }
      .sidebar { width: 85%; }
    }
  </style>
</head>
<body>
  
  <div id="root" style="width: 100%;"></div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, onValue, set, off, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAs2S6iRhnYhmqNuF0QCCYu5NuzxHxIRv0",
      authDomain: "tvnstream-b4497.firebaseapp.com",
      databaseURL: "https://tvnstream-b4497-default-rtdb.firebaseio.com",
      projectId: "tvnstream-b4497",
      storageBucket: "tvnstream-b4497.appspot.com",
      messagingSenderId: "308384754214",
      appId: "1:308384754214:web:2938e76cd29b288f75d4e7",
    };

    const app = initializeApp(firebaseConfig);
    window.db = getDatabase(app);
    window.auth = getAuth(app);
    window.fbRef = ref;
    window.fbOnValue = onValue;
    window.fbSet = set;
    window.fbRemove = remove; 
    window.fbOff = off;
    window.fbOnAuthStateChanged = onAuthStateChanged;

    window.firebaseIsReady = true;
    if (typeof window.mountReactApp === 'function') window.mountReactApp();
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    function WatchHistoryApp() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      
      const [usersData, setUsersData] = useState({});
      const [watchHistoryData, setWatchHistoryData] = useState({});

      useEffect(() => {
        const unsubscribeAuth = window.fbOnAuthStateChanged(window.auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const myProfileRef = window.fbRef(window.db, `users/${currentUser.uid}`);
            window.fbOnValue(myProfileRef, (snap) => {
              const myData = snap.val();
              if (myData && myData.role === 'admin') {
                setIsAdmin(true);
                
                const usersRef = window.fbRef(window.db, 'users');
                window.fbOnValue(usersRef, (usersSnap) => setUsersData(usersSnap.val() || {}));

                const historyRef = window.fbRef(window.db, 'watchHistory');
                window.fbOnValue(historyRef, (historySnap) => setWatchHistoryData(historySnap.val() || {}));

              } else {
                setIsAdmin(false);
              }
              setAuthLoading(false);
            });
          } else {
            setAuthLoading(false);
            setIsAdmin(false);
          }
        });
        return () => unsubscribeAuth();
      }, []);

      const { formattedHistory, activeViewersCount } = useMemo(() => {
        let activeCount = 0;
        const now = Date.now(); 
        
        const historyArray = Object.entries(watchHistoryData).map(([uid, videosObj]) => {
          const userInfo = usersData[uid] || {};
          let videos = [];

          if (videosObj && typeof videosObj === 'object') {
            videos = Object.entries(videosObj).map(([videoId, vData]) => {
              
              const totalSeconds = vData.currentTime || 0;
              const calcMinutes = Math.floor(totalSeconds / 60);

              const lastUpdated = vData.timestamp || 0;
              const isCurrentlyWatching = lastUpdated > 0 && (now - lastUpdated) < 180000;

              if (isCurrentlyWatching) activeCount++;

              return {
                id: videoId,
                title: vData.title || videoId,
                image: vData.image || "https://placehold.co/100x60/121212/555?text=Video",
                minutes: calcMinutes,
                isActive: isCurrentlyWatching
              };
            });
          }

          return {
            uid,
            name: userInfo.name || 'Unknown User',
            email: userInfo.email || 'No email registered',
            videos
          };
        });

        return { formattedHistory: historyArray, activeViewersCount: activeCount };
      }, [watchHistoryData, usersData]);

      const handleDeleteUserHistory = (uid) => {
        if(window.confirm("Are you sure you want to delete this user's watch history?")) {
          const ref = window.fbRef(window.db, `watchHistory/${uid}`);
          window.fbRemove(ref).catch(err => alert("Error deleting history: " + err.message));
        }
      };

      const handleClearAllHistory = () => {
        if(window.confirm("WARNING: This will delete ALL watch history for everyone. Proceed?")) {
          const ref = window.fbRef(window.db, `watchHistory`);
          window.fbRemove(ref).catch(err => alert("Error clearing database: " + err.message));
        }
      };

      return (
        <React.Fragment>
          {/* === HEADER / TOP NAV === */}
          <nav className="top-nav">
            <div className="menu-trigger" onClick={() => setSidebarOpen(true)}>
              <i className="fas fa-bars-staggered"></i>
            </div>
            <div className="logo">ZONE VAULT</div>
            <div style={{width: '36px'}}></div>
          </nav>

          {/* === SIDEBAR === */}
          <div className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <aside className={`sidebar ${sidebarOpen ? 'active' : ''}`}>
            <div style={{ marginBottom: '40px', paddingLeft: '15px' }}>
              <h3 style={{ fontSize: '20px', fontWeight: '700', color: '#fff' }}>Admin Panel</h3>
              <p style={{ fontSize: '13px', color: 'var(--text-muted)', margin: 0 }}>Management Suite</p>
            </div>
            <a href="panel" className="nav-btn"><i className="fas fa-house"></i><span>Admin Home</span></a>
            <a href="upload" className="nav-btn"><i className="fas fa-cloud-arrow-up"></i><span>Upload Video</span></a>
            <a href="request_join" className="nav-btn"><i className="fas fa-user-plus"></i><span>Request Join</span></a>
            <a href="notif" className="nav-btn"><i className="fas fa-bullhorn"></i><span>Notifications</span></a>
            <a href="generator" className="nav-btn"><i className="fas fa-key"></i><span>Access Codes</span></a>
            <a href="page_access" className="nav-btn"><i className="fas fa-shield-halved"></i><span>Page Access</span></a>
            <a href="watch_history" className="nav-btn active"><i className="fas fa-history"></i><span>Watch History</span></a>
            <a href="user_directory" className="nav-btn"><i className="fas fa-address-book"></i><span>User Directory</span></a>
          </aside>

          {/* === MAIN CONTENT === */}
          <main className="main-content">
            <header>
              <p className="subtitle">
                {user && isAdmin ? (
                  <span>Logged in as Admin: <strong>{user.email}</strong></span>
                ) : (
                  "Monitor user playback activity"
                )}
              </p>
              
              {user && isAdmin && (
                <button className="btn-danger-top" onClick={handleClearAllHistory} title="Delete All History">
                  <i className="fas fa-trash-can"></i> Clear All Records
                </button>
              )}

              {user && !authLoading && isAdmin && (
                <div className="active-count">
                  <i className="fas fa-satellite-dish"></i> Active Streams: 
                  <strong style={{fontSize: '16px'}}>{activeViewersCount}</strong>
                </div>
              )}
            </header>

            {/* Empty State: Not Logged In */}
            {!user && !authLoading && (
              <div className="empty-state">
                <i className="fas fa-lock"></i>
                <p>You must be logged in to view this page.</p>
                <p className="error-text">Please go back to the Login page and sign in first.</p>
              </div>
            )}

            {/* Empty State: Loading */}
            {user && authLoading && (
              <div className="empty-state">
                <i className="fas fa-spinner fa-spin"></i>
                <p>Authenticating & Loading data...</p>
              </div>
            )}

            {/* Empty State: Access Blocked / Not an Admin */}
            {user && !authLoading && !isAdmin && (
              <div className="empty-state">
                <i className="fas fa-shield-lock" style={{ color: 'var(--accent-decline)' }}></i>
                <h2 style={{ color: 'var(--accent-decline)', marginBottom: '5px', marginTop: '10px' }}>Access Denied</h2>
                <p>You need admin privileges to view this page.</p>
              </div>
            )}

            {/* Main History Data (Only visible to Admins) */}
            {user && !authLoading && isAdmin && (
              <div className="scroll-container">
                <div className="history-grid">
                  {formattedHistory.length === 0 ? (
                    <div className="empty-history">
                      <i className="fas fa-inbox"></i>
                      <h2 style={{color: 'var(--text-main)', fontSize: '20px', marginBottom: '5px'}}>No Watch History Found</h2>
                      <p>Users haven't started watching anything yet.</p>
                    </div>
                  ) : (
                    formattedHistory.map((userObj) => (
                      <div className="user-history-card" key={userObj.uid}>
                        
                        <div className="card-header">
                          <div className="user-ident">
                            <span className="user-name" title={userObj.name}>{userObj.name}</span>
                            <span className="user-email" title={userObj.email}>{userObj.email}</span>
                            <span className="user-uid">UID: {userObj.uid}</span>
                          </div>
                          <button 
                            className="btn-delete-small" 
                            onClick={() => handleDeleteUserHistory(userObj.uid)}
                            title="Delete this user's history"
                          >
                            <i className="fas fa-trash"></i>
                          </button>
                        </div>

                        <div className="video-list">
                          {userObj.videos.length === 0 ? (
                            <p style={{color: 'var(--text-muted)', fontSize: '13px', textAlign: 'center', marginTop: '10px'}}>No videos logged.</p>
                          ) : (
                            userObj.videos.map((vid, index) => (
                              <div className="video-item" key={index}>
                                <img src={vid.image} alt="thumbnail" className="video-thumb" onError={(e) => e.target.src='https://placehold.co/100x60/121212/555?text=No+Image'} />
                                <div className="video-info">
                                  <span className="video-title" title={vid.title}>{vid.title}</span>
                                  <div className="video-meta">
                                    <span><i className="far fa-clock"></i> {vid.minutes} mins</span>
                                    {vid.isActive && (
                                      <span className="live-indicator">
                                        <div className="pulse-dot"></div> Active
                                      </span>
                                    )}
                                  </div>
                                </div>
                              </div>
                            ))
                          )}
                        </div>

                      </div>
                    ))
                  )}
                </div>
              </div>
            )}
            
          </main>
        </React.Fragment>
      );
    }

    window.mountReactApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<WatchHistoryApp />);
    };
    if (window.firebaseIsReady) window.mountReactApp();
  </script>
</body>
</html>
