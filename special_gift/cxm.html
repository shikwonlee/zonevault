<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CXM [DOUBLE UP] LIVE PARTY | Zone Vault</title>
   
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>

    :root {
        /* SOLID DARK THEME (MATTE) */
        --bg-color: #09090b; 
        --card-bg: #18181b;  
        --border-color: #27272a; 
        --hover-bg: #27272a;
        --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-float: 0 10px 30px rgba(0, 0, 0, 0.6);

        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        
        --accent: #ffffff;
        --status-online: #22c55e;
        --admin-color: #ef4444; 
        --youtube-red: #ff0000;
        
        --sidebar-width-collapsed: 64px; 
        --sidebar-width-expanded: 220px; 
        
        --input-bg: #27272a;
    }

    body.light-mode {
        /* SOLID LIGHT THEME (MATTE) */
        --bg-color: #f4f4f5;
        --card-bg: #ffffff;
        --border-color: #e4e4e7;
        --hover-bg: #f4f4f5;
        --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-float: 0 10px 30px rgba(0, 0, 0, 0.08);

        --text-main: #18181b;
        --text-muted: #71717a;
        --input-bg: #f4f4f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }

    body { 
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Outfit', sans-serif;
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
        overflow-x: hidden;
        position: relative;
    }
    
    body.no-scroll { overflow: hidden; }

    .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(5px); }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    /* =========================================
       3. MODERN BUTTONS & MODAL (NO BLUR)
       ========================================= */
    .hero-notif-btn, .header-btn {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-subtle); 
        color: var(--text-main);
        display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; text-decoration: none;
    }
    
    .hero-notif-btn { position: absolute !important; top: 30px; right: 40px; z-index: 9999; width: 44px; height: 44px; border-radius: 50%; font-size: 16px; }
    .header-btn { width: 40px; height: 40px; border-radius: 50%; font-size: 16px; pointer-events: auto; position: relative; }
    
    .hero-notif-btn:hover, .header-btn:hover { background: var(--hover-bg); transform: translateY(-2px); box-shadow: var(--shadow-float); }
    
    .hero-notif-btn .badge, .header-btn .badge { 
        position: absolute; top: 0px; right: 0px; width: 12px; height: 12px; 
        background: var(--admin-color); border-radius: 50%; border: 2px solid var(--card-bg); display: none; 
    }
    .hero-notif-btn .badge.active, .header-btn .badge.active { display: block; }

    .notif-modal { 
        position: absolute !important; top: 85px; right: 40px; width: 340px; max-height: 400px; 
        background: var(--card-bg); border: 1px solid var(--border-color); 
        box-shadow: var(--shadow-float); border-radius: 16px; display: none; flex-direction: column; z-index: 9999; overflow-y: auto; 
    }
    .notif-modal.active { display: flex; animation: dropDown 0.2s ease; }
    @keyframes dropDown { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
    
    .notif-header { padding: 16px; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; }
    .notif-item { padding: 14px 16px; border-bottom: 1px solid var(--border-color); display: flex; gap: 14px; align-items: flex-start; transition: 0.2s; }
    .notif-item:hover { background: var(--hover-bg); }
    .notif-icon { width: 34px; height: 34px; border-radius: 50%; background: var(--input-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-main); flex-shrink: 0; }
    .notif-content h5 { font-size: 14px; color: var(--text-main); margin-bottom: 4px; }
    .notif-content p { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .notif-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* =========================================
       5. COLLECTION LAYOUT (SOLID STYLES)
       ========================================= */
    .main-wrapper { max-width: 1600px; margin: 0 auto; width: 100%; padding-bottom: 100px; padding-top: 40px;}
    
    .page-title {
        font-size: 28px; font-weight: 800; margin-bottom: 20px; padding: 0 40px;
        text-transform: uppercase; letter-spacing: 1px; color: var(--text-main);
        line-height: 1.3;
    }

    .header-row {
        display: flex; justify-content: flex-start; align-items: center;
        margin-bottom: 20px; padding: 0 40px;
    }

    /* Fixed bottom-left back button, plain text, no box */
    .back-to-cat-btn {
        display: inline-flex; align-items: center; gap: 8px;
        position: fixed; bottom: 25px; left: 25px; z-index: 1500;
        background: transparent; color: var(--text-main); border: none;
        font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
        padding: 0; box-shadow: none;
        transition: opacity 0.2s ease;
    }
    .back-to-cat-btn:hover { opacity: 0.7; }

    /* CATEGORY GRID */
    .category-menu-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px; padding: 0 40px; animation: fadeIn 0.4s ease;
    }

    .cat-card {
        background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px;
        overflow: hidden; cursor: pointer; position: relative; aspect-ratio: 16/9;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        box-shadow: var(--shadow-subtle);
        text-decoration: none; display: block;
    }
    .cat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-float); border-color: var(--text-muted); }
    .cat-card img { width: 100%; height: 100%; object-fit: cover; object-position: center top; transition: transform 0.5s; filter: brightness(0.7); }
    .cat-card:hover img { transform: scale(1.05); filter: brightness(0.5); }
    .cat-title-overlay {
        position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }
    .cat-title-overlay h3 { margin: 0; font-size: 16px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: 0.5px; }

    /* IMAGE GALLERIES - sized per each image's own aspect ratio (no forced square crop) */
    .collection-section { animation: fadeIn 0.4s ease; padding: 0 40px; }
    .gallery-grid {
        display: flex; flex-wrap: wrap; gap: 15px;
        justify-content: center; /* centers each row, and centers a lone image */
    }

    .gallery-item {
        position: relative; border-radius: 12px; height: 260px;
        overflow: hidden; cursor: pointer; border: 1px solid var(--border-color);
        background: var(--card-bg); transition: transform 0.2s ease, border-color 0.2s ease;
        display: flex; align-items: center; justify-content: center;
    }
    .gallery-item:hover { transform: scale(1.03); border-color: var(--text-main); z-index: 2; box-shadow: var(--shadow-subtle); }
    .gallery-item img { height: 100%; width: auto; max-width: 100%; object-fit: contain; display: block; transition: opacity 0.3s; }

    /* LIGHTBOX (SOLID / DARK) */
    .lightbox-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .lightbox-overlay.active { display: flex; opacity: 1; }
    .lightbox-content-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; padding-bottom: 80px; }
    .lightbox-content {
        max-width: 95vw; max-height: 80vh; object-fit: contain;
        box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-radius: 4px;
        transition: transform 0.2s ease-out; transform-origin: center center; cursor: zoom-in;
    }
    .lightbox-content.zoomed { cursor: grab; }
    .lightbox-content.zoomed:active { cursor: grabbing; }

    .lightbox-thumbs {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px; max-width: 90%; overflow-x: auto;
        padding: 10px; background: var(--card-bg); border-radius: 16px;
        border: 1px solid var(--border-color); box-shadow: var(--shadow-float);
        z-index: 20005; scrollbar-width: none; 
    }
    .lightbox-thumbs::-webkit-scrollbar { display: none; }
    .lb-thumb { width: 50px; height: 50px; object-fit: cover; object-position: center top; border-radius: 8px; cursor: pointer; opacity: 0.5; transition: 0.2s; border: 2px solid transparent; flex-shrink: 0; }
    .lb-thumb:hover { opacity: 0.8; }
    .lb-thumb.active { opacity: 1; border-color: var(--text-main); transform: scale(1.1); }

    .lightbox-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 20003; }
    .lightbox-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 16px; box-shadow: var(--shadow-subtle); }
    .lightbox-btn:hover { background: var(--hover-bg); transform: scale(1.1); }

    /* Toasts & Modals */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card-bg); border: 1px solid var(--border-color); box-shadow: var(--shadow-float); color: var(--text-main); padding: 14px 28px; border-radius: 50px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.4s ease; }
    .toast.show { bottom: 50px; opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .access-denied-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .access-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 50px; border-radius: 16px; text-align: center; color: var(--text-main); max-width: 420px; width: 90%; box-shadow: var(--shadow-float); }
    .access-icon-box { width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 28px; border-top: 1px solid rgba(239, 68, 68, 0.2); }
    .access-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .access-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }
    .access-btn { background: var(--text-main); color: var(--bg-color); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .access-btn:hover { transform: translateY(-2px); opacity: 0.9; }

    /* =========================================
       6. MOBILE RESPONSIVENESS
       ========================================= */
    @media (max-width: 900px) {
        .hero-notif-btn { display: none !important; }
        .main-wrapper { padding-top: 30px; padding-bottom: 110px; }

        .notif-modal { 
            position: fixed !important; top: 75px !important; right: 15px !important; 
            width: 320px; max-width: calc(100vw - 30px); z-index: 9999; left: auto; transform: none; 
        }
        
        .category-menu-grid, .collection-section { padding: 0 20px; }

        .header-row { padding: 0 20px; }

        /* Title: much smaller + wraps nicely on phones */
        .page-title {
            font-size: 15px;
            letter-spacing: 0.3px;
            padding: 0;
            white-space: normal;
            word-break: break-word;
        }

        .back-to-cat-btn {
            bottom: 16px; left: 16px;
            font-size: 13px;
        }

        .gallery-grid { gap: 10px; }
        .gallery-item { height: 160px; }
        .cat-card { aspect-ratio: 4/3; }
    }

  </style>
</head>
<body>


<div class="main-wrapper fade-in">
    <div class="header-row">
        <h1 class="page-title">CXM [DOUBLE UP] LIVE PARTY in INCHEON ALL DAY PASS SPECIAL GIFTS</h1>
    </div>

    <div class="collection-section">
        <div class="gallery-grid" id="grid-category"></div>
    </div>
</div>

<a href="/collection" class="back-to-cat-btn">
    <i class="fas fa-arrow-left"></i> Back to Collections
</a>

<div id="lightbox" class="lightbox-overlay">
    <div class="lightbox-controls">
        <div class="lightbox-btn" onclick="downloadImage()">
            <i class="fas fa-download"></i>
        </div>
        <div class="lightbox-btn" onclick="closeLightbox()">
            <i class="fas fa-times"></i>
        </div>
    </div>
    
    <div class="lightbox-content-wrapper">
        <img id="lightbox-img" src="" class="lightbox-content">
    </div>

    <div id="lightbox-thumbs" class="lightbox-thumbs">
    </div>
</div>

<script type="module" src="/special_gift/js/cxm.js"></script>

</body>
</html>
