<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>HOSHI x WOOZI GWANGJU | Zone Vault</title>

  <link rel="icon" href="/favicon-new.png" type="image/png" />
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- ArtPlayer -->
  <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

  <style>

    :root {
        /* SOLID DARK THEME (MATTE) */
        --bg-color: #09090b; 
        --card-bg: #18181b;  
        --border-color: #27272a; 
        --hover-bg: #27272a;
        --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-float: 0 10px 30px rgba(0, 0, 0, 0.6);

        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        
        --accent: #ffffff;
        --status-online: #22c55e;
        --admin-color: #ef4444; 
        --youtube-red: #ff0000;
        
        --sidebar-width-collapsed: 64px; 
        --sidebar-width-expanded: 220px; 
        
        --input-bg: #27272a;
    }

    body.light-mode {
        /* SOLID LIGHT THEME (MATTE) */
        --bg-color: #f4f4f5;
        --card-bg: #ffffff;
        --border-color: #e4e4e7;
        --hover-bg: #f4f4f5;
        --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-float: 0 10px 30px rgba(0, 0, 0, 0.08);

        --text-main: #18181b;
        --text-muted: #71717a;
        --input-bg: #f4f4f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }

    body { 
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Outfit', sans-serif;
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
        overflow-x: hidden;
        position: relative;
    }
    
    body.no-scroll { overflow: hidden; }

    .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(5px); }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    /* =========================================
       5. COLLECTION LAYOUT (SOLID STYLES)
       ========================================= */
    .main-wrapper { max-width: 1600px; margin: 0 auto; width: 100%; padding-bottom: 100px; padding-top: 40px;}
    
    .page-title {
        font-size: 28px; font-weight: 800; margin-bottom: 20px; padding: 0 40px;
        text-transform: uppercase; letter-spacing: 1px; color: var(--text-main);
        line-height: 1.3;
    }

    .header-row {
        display: flex; justify-content: flex-start; align-items: center;
        margin-bottom: 20px; padding: 0 40px;
    }

    /* Fixed bottom-left back button, plain text, no box */
    .back-to-cat-btn {
        display: inline-flex; align-items: center; gap: 8px;
        position: fixed; bottom: 25px; left: 25px; z-index: 1500;
        background: transparent; color: var(--text-main); border: none;
        font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
        padding: 0; box-shadow: none;
        transition: opacity 0.2s ease;
    }
    .back-to-cat-btn:hover { opacity: 0.7; }

    /* VIDEO GALLERY */
    .collection-section { animation: fadeIn 0.4s ease; padding: 0 40px; }
    .gallery-grid {
        display: flex; flex-wrap: wrap; gap: 20px;
        justify-content: center; /* centers each row, and centers a lone video */
    }

    .video-card {
        position: relative; border-radius: 14px; aspect-ratio: 16/9;
        width: 380px; max-width: 100%;
        overflow: hidden; cursor: pointer; border: 1px solid var(--border-color);
        background: #000; transition: transform 0.2s ease, border-color 0.2s ease;
        display: flex; align-items: center; justify-content: center;
    }
    .video-card:hover { transform: translateY(-4px); border-color: var(--text-main); box-shadow: var(--shadow-float); }
    .video-card .video-thumb-overlay {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.15));
    }
    .video-card .play-icon {
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; color: #fff; transition: 0.2s;
    }
    .video-card:hover .play-icon { background: rgba(255,255,255,0.28); transform: scale(1.08); }
    .video-card .video-title-overlay {
        position: absolute; bottom: 0; left: 0; width: 100%; padding: 16px;
        font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.3px;
        text-transform: uppercase;
    }

    /* VIDEO LIGHTBOX (PLAYER MODAL) */
    .lightbox-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .lightbox-overlay.active { display: flex; opacity: 1; }
    .lightbox-content-wrapper {
        flex: 1; display: flex; align-items: center; justify-content: center;
        width: 100%; max-width: 1100px; padding: 0 20px;
    }
    #video-player-container {
        width: 100%; aspect-ratio: 16/9; max-height: 80vh;
        border-radius: 8px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        background: #000;
    }

    .lightbox-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 20003; }
    .lightbox-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 16px; box-shadow: var(--shadow-subtle); }
    .lightbox-btn:hover { background: var(--hover-bg); transform: scale(1.1); }

    /* Toasts & Modals */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card-bg); border: 1px solid var(--border-color); box-shadow: var(--shadow-float); color: var(--text-main); padding: 14px 28px; border-radius: 50px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.4s ease; }
    .toast.show { bottom: 50px; opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .access-denied-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .access-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 50px; border-radius: 16px; text-align: center; color: var(--text-main); max-width: 420px; width: 90%; box-shadow: var(--shadow-float); }
    .access-icon-box { width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 28px; border-top: 1px solid rgba(239, 68, 68, 0.2); }
    .access-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .access-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }
    .access-btn { background: var(--text-main); color: var(--bg-color); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .access-btn:hover { transform: translateY(-2px); opacity: 0.9; }

    /* =========================================
       6. MOBILE RESPONSIVENESS
       ========================================= */
    .header-btn {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-subtle); 
        color: var(--text-main);
        display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; text-decoration: none;
        width: 40px; height: 40px; border-radius: 50%; font-size: 16px; pointer-events: auto; position: relative;
    }
    .header-btn:hover { background: var(--hover-bg); transform: translateY(-2px); box-shadow: var(--shadow-float); }

    /* Hide ArtPlayer's fullscreen buttons (web + browser fullscreen) */
    .art-control-fullscreen,
    .art-control-fullscreenWeb {
        display: none !important;
    }

    /* Hide the progress/seek bar and time display */
    .art-progress,
    .art-control-progress,
    .art-control-time {
        display: none !important;
    }

    @media (max-width: 900px) {
        .main-wrapper { padding-top: 30px; padding-bottom: 110px; }

        .category-menu-grid, .collection-section { padding: 0 20px; }
        .header-row { padding: 0 20px; }

        .page-title {
            font-size: 15px;
            letter-spacing: 0.3px;
            padding: 0;
            white-space: normal;
            word-break: break-word;
        }

        .back-to-cat-btn {
            bottom: 16px; left: 16px;
            font-size: 13px;
        }

        .gallery-grid { gap: 12px; }
        .video-card { width: 100%; }
    }

  </style>
</head>
<body>

</div>

<script type="module" src="/special_gift/js/hoshixwoozi1.js?v=3"></script>

</body>
</html>
