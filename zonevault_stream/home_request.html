<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Access & Login | Zone Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root {
      --surface-bg: #0a0a0c;
      --surface-1: #141414;
      --surface-2: #1e1e1e;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --accent-flat: #e53935; 
      --success: #4CAF50;
  }
  * { box-sizing: border-box; }
  body {
    background-color: var(--surface-bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 20px; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-box {
      background: var(--surface-1); padding: 32px 24px; border-radius: 16px; width: 100%; max-width: 400px;
      border: 1px solid var(--border-subtle); text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .auth-box img { width: 56px; border-radius: 12px; margin-bottom: 16px; }
  .auth-box h2 { margin: 0 0 8px 0; font-size: 22px; }
  .auth-box p.sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
  .auth-box input {
      width: 100%; padding: 14px; margin-bottom: 12px; background: var(--surface-2); color: var(--text-primary);
      border: 1px solid var(--border-subtle); border-radius: 8px; outline: none; transition: 0.2s; font-size: 14px;
  }
  .auth-box input:focus { border-color: var(--text-secondary); }
  .btn-submit { width: 100%; padding: 14px; background: var(--text-primary); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  #auth-msg { margin-top: 16px; font-size: 13px; font-weight: 500; min-height: 20px; line-height: 1.4;}
</style>
</head>
<body>

<div class="auth-box">
    <img src="https://uploads.onecompiler.io/43ddry4jt/43s3sjvch/Zone%20Vault%20logo.png" alt="Logo">
    <h2>Zone Vault</h2>
    <p class="sub">Log in with approved username, or request new access</p>
    
    <input type="text" id="tg-user" placeholder="Telegram Username (e.g. @carat123)" autocomplete="off">
    <input type="password" id="tg-code" placeholder="Access Code (Leave blank if already approved)" autocomplete="off">
    
    <button class="btn-submit" onclick="requestAccess()" id="submitBtn">Submit</button>
    
    <p id="auth-msg"></p>
</div>

<script>
// Disable Right-Click (Context Menu)
document.addEventListener('contextmenu', event => event.preventDefault());

const firebaseConfig = {
  apiKey: "AIzaSyAeaQVRzcL9qvGRKpqGyPKolTMltieN3zU",
  authDomain: "notif-bfe68.firebaseapp.com",
  databaseURL: "https://notif-bfe68-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "notif-bfe68",
  storageBucket: "notif-bfe68.firebasestorage.app",
  messagingSenderId: "417377105074",
  appId: "1:417377105074:web:bf27cd8dbbf0cc101005ab"
};
firebase.initializeApp(firebaseConfig);

// Setup Realtime Database
const dbRTDB = firebase.database();

let storedUser = localStorage.getItem("zone_vault_user");
let mContainer = document.getElementById("auth-msg");
let btn = document.getElementById("submitBtn");

let isApproved = false;

// FUNCTION: Real-time dual listener for approval and rejection
function listenForApproval(username) {
    mContainer.innerText = `Request is active for ${username}.\nPlease wait for admin approval...`;
    mContainer.style.color = "var(--text-secondary)";
    
    const approvedRef = dbRTDB.ref("approved_users/" + username);
    const requestRef = dbRTDB.ref("join_requests/" + username);
    
    // 1. Listen for Approval
    approvedRef.on("value", (snapshot) => {
        if (snapshot.exists()) {
            isApproved = true;
            mContainer.innerHTML = "Access Approved!<br>Redirecting you to the events...";
            mContainer.style.color = "var(--success)";
            setTimeout(() => { window.location.href = "live_event.html"; }, 1500);
        } else {
            isApproved = false;
        }
    });

    // 2. Listen for Rejection (Deleted from join_requests)
    requestRef.on("value", (snapshot) => {
        if (!snapshot.exists() && !isApproved) {
            setTimeout(() => {
                if (!isApproved) {
                    approvedRef.off();
                    requestRef.off();
                    resetForm();
                }
            }, 1000);
        }
    });
}

// FUNCTION: Reset form for a new attempt
function resetForm() {
    localStorage.removeItem("zone_vault_user"); 
    document.getElementById("tg-user").value = "";
    document.getElementById("tg-code").value = "";
    document.getElementById("tg-user").disabled = false;
    document.getElementById("tg-code").disabled = false;
    
    btn.disabled = false;
    btn.innerText = "Submit";
    
    mContainer.innerHTML = "Your previous request was rejected or deleted.<br>You may submit a new request.";
    mContainer.style.color = "var(--accent-flat)";
}

// Auto-trigger listener if local storage exists
if (storedUser) {
    document.getElementById("tg-user").value = storedUser;
    document.getElementById("tg-user").disabled = true;
    document.getElementById("tg-code").disabled = true;
    btn.disabled = true;
    btn.innerText = "Awaiting Verification";
    
    listenForApproval(storedUser);
}

// MAIN FUNCTION: Handle unified Login & Sign-up check
async function requestAccess() {
    const user = document.getElementById("tg-user").value.trim();
    const code = document.getElementById("tg-code").value.trim();
    
    if(!user) {
        mContainer.innerText = "Please provide your Telegram Username.";
        mContainer.style.color = "var(--accent-flat)";
        return;
    }

    btn.innerText = "Checking...";
    btn.disabled = true;
    mContainer.innerText = "";

    try {
        // STEP 1: LOGIN CHECK - Is the user already approved?
        const approvedSnapshot = await dbRTDB.ref("approved_users/" + user).once("value");
        if (approvedSnapshot.exists()) {
            mContainer.innerHTML = "Username recognized!<br>Logging you in...";
            mContainer.style.color = "var(--success)";
            localStorage.setItem("zone_vault_user", user); // Save to local storage
            setTimeout(() => { window.location.href = "live_event.html"; }, 1500);
            return; // Stop execution here
        }

        // STEP 2: DUPLICATE CHECK - Is the username already pending?
        const pendingSnapshot = await dbRTDB.ref("join_requests/" + user).once("value");
        if (pendingSnapshot.exists()) {
            mContainer.innerText = "This username is already taken or currently pending approval.";
            mContainer.style.color = "var(--accent-flat)";
            btn.innerText = "Submit";
            btn.disabled = false;
            return; // Stop execution here
        }

        // STEP 3: NEW REQUEST - If not approved and not pending, require the Access Code
        if (!code) {
            mContainer.innerText = "Please provide an Access Code for a new request.";
            mContainer.style.color = "var(--accent-flat)";
            btn.innerText = "Submit";
            btn.disabled = false;
            return;
        }

        // STEP 4: SUBMIT TO FIREBASE
        btn.innerText = "Sending...";
        await dbRTDB.ref("join_requests/" + user).set({
            username: user,
            code: code,
            status: "pending",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        // Save to browser memory and disable UI
        localStorage.setItem("zone_vault_user", user);
        document.getElementById("tg-user").disabled = true;
        document.getElementById("tg-code").disabled = true;
        btn.innerText = "Awaiting Verification";
        
        // Start the real-time listener for the new request
        listenForApproval(user);
        
    } catch(e) {
        console.error("Firebase Error:", e);
        mContainer.innerText = "Error connecting to the server. Please try again.";
        mContainer.style.color = "var(--accent-flat)";
        btn.innerText = "Submit";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
