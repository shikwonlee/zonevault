<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live | Zone Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script> <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

<style>
  :root {
      --surface-bg: #0a0a0c;
      --surface-1: #141414;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --brand-color: #e53935; 
  }
  * { box-sizing: border-box; }
  body {
    background-color: var(--surface-bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 16px; min-height: 100vh;
  }
  .player-layout { max-width: 1200px; margin: 0 auto; }
  
  #player-container { 
      width: 100%; aspect-ratio: 16/9; background: #000; 
      border-radius: 8px; overflow: hidden; 
      border: 1px solid var(--border-subtle); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      position: relative;
  }
  .artplayer-app { width: 100%; height: 100%; }
  
  .server-controls { 
      display: flex; gap: 10px; margin-top: 16px; margin-bottom: 8px; justify-content: flex-start;
  }
  .server-btn {
      background: var(--surface-1); color: var(--text-secondary);
      border: 1px solid var(--border-subtle); padding: 8px 16px;
      border-radius: 6px; cursor: pointer; font-weight: 600;
      transition: all 0.2s ease;
  }
  .server-btn:hover { background: #1f1f23; color: white; }
  .server-btn.active {
      background: var(--brand-color); color: white;
      border-color: var(--brand-color);
  }

  .standby-screen { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: #0a0a0c; color: var(--text-secondary); text-align: center; padding: 20px;
  }
  
  .video-title { margin-top: 8px; font-size: 20px; font-weight: 600; line-height: 1.3; color: var(--text-primary); }
  .user-badge { margin-top: 8px; background: var(--surface-1); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid var(--border-subtle); display: inline-block;}
  
  .back-btn { display: inline-block; margin-bottom: 16px; text-decoration: none; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
  .back-btn:hover { color: var(--text-primary); }

  @media (min-width: 768px) {
      body { padding: 24px; }
      #player-container { border-radius: 12px; }
      .video-title { font-size: 26px; }
      .back-btn { margin-bottom: 24px; }
  }
</style>
</head>
<body>

<div id="security-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--surface-bg); z-index: 999; display: flex; align-items: center; justify-content: center;">
    <p>Verifying access...</p>
</div>

<div class="player-layout" id="main-content" style="display: none;">
  <a href="live_event.html" class="back-btn">&larr; Back to Events</a>

  <div id="player-container">
     <div class="artplayer-app"></div>
  </div>

  <div class="server-controls">
      <button class="server-btn active" id="btn-server-1" onclick="switchServer(1)">Server 1</button>
      <button class="server-btn" id="btn-server-2" onclick="switchServer(2)">Server 2</button>
  </div>

  <div class="video-title" id="main-title">Awaiting Signal...</div>
  <div class="user-badge" id="username-badge">User: @username</div>
</div>

<script>
// Prevent Right-Click and Inspect Element Shortcuts
document.addEventListener('contextmenu', event => event.preventDefault());
document.onkeydown = function(e) {
    if(e.keyCode == 123) { return false; } 
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } 
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } 
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } 
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } 
}

const firebaseConfig = {
  apiKey: "AIzaSyAeaQVRzcL9qvGRKpqGyPKolTMltieN3zU",
  authDomain: "notif-bfe68.firebaseapp.com",
  databaseURL: "https://notif-bfe68-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "notif-bfe68",
  storageBucket: "notif-bfe68.firebasestorage.app",
  messagingSenderId: "417377105074",
  appId: "1:417377105074:web:bf27cd8dbbf0cc101005ab"
};
firebase.initializeApp(firebaseConfig);

// Gamitin lamang ang Realtime Database
const dbRealtime = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
let currentEventId = urlParams.get('v');
let providedUser = urlParams.get('u');

let art = null;
let currentServer = 1;
let currentStreamUrl = "";
let isListening = false;
let isUserApproved = false;

let viewerRef = null;

if (!currentEventId || !providedUser) {
    window.location.replace("live_event.html");
} else {
    // Pinalitan ng RTDB ang pag-check ng approved users
    dbRealtime.ref("approved_users/" + providedUser).once("value").then((doc) => {
        if (doc.exists()) {
            dbRealtime.ref(`event_access/${currentEventId}/${providedUser}`).on('value', (snap) => {
                if (snap.val() === true) {
                    isUserApproved = true;
                    document.getElementById("security-overlay").style.display = "none";
                    document.getElementById("main-content").style.display = "block";
                    document.getElementById("username-badge").innerText = `User: ${providedUser}`;
                    
                    if(!isListening) {
                        startListeningToEvent(currentEventId);
                        viewerRef = dbRealtime.ref(`active_viewers/${currentEventId}/${providedUser}`);
                        viewerRef.set(true);
                        viewerRef.onDisconnect().remove(); 
                        isListening = true;
                    }
                } else {
                    isUserApproved = false;
                    if (art) { art.destroy(true); art = null; }
                    document.getElementById("player-container").innerHTML = ""; 
                    document.getElementById("main-content").style.display = "none";
                    if(viewerRef) { viewerRef.remove(); }
                    window.location.replace("live_event.html"); 
                }
            });
        } else {
            window.location.replace("index.html"); 
        }
    }).catch(() => {
        window.location.replace("index.html");
    });
}

window.addEventListener("beforeunload", function() {
    if(viewerRef) { viewerRef.remove(); }
});

function startListeningToEvent(eventId) {
    dbRealtime.ref('live_events/' + eventId).on('value', (snapshot) => {
        const ev = snapshot.val();
        if(!ev) { 
            document.getElementById("main-title").innerText = "Transmission Terminated."; 
            return; 
        }
        
        document.getElementById("main-title").innerText = ev.stream_title || ev.title;
        currentStreamUrl = ev.stream_url || ev.url || "";
        
        if (currentServer === 1 && isUserApproved) { 
            renderActivePlayer(); 
        }
    });
}

function switchServer(serverNum) {
    if (currentServer === serverNum || !isUserApproved) return;
    
    currentServer = serverNum;
    document.getElementById('btn-server-1').classList.toggle('active', serverNum === 1);
    document.getElementById('btn-server-2').classList.toggle('active', serverNum === 2);
    
    renderActivePlayer();
}

function renderActivePlayer() {
    if (!isUserApproved) return; 

    const container = document.getElementById("player-container");

    if (art) { art.destroy(true); art = null; }

    if (currentServer === 1) {
        if (currentStreamUrl.trim() === "") {
            container.innerHTML = `
                <div class="standby-screen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 16px; opacity: 0.5;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <h2>Standby</h2>
                    <p>The stream link has not been activated by the admin yet.</p>
                </div>
            `;
        } else {
            container.innerHTML = `<div class="artplayer-app"></div>`;
            setupArtplayer(currentStreamUrl);
        }

    } else if (currentServer === 2) {
        container.innerHTML = `
            <iframe 
                src="https://player.angelthump.com/?channel=tenthreedee" 
                style="width: 100%; height: 100%; border: none; display: block;" 
                allow="fullscreen"
                allowfullscreen="true">
            </iframe>
        `;
    }
}

function setupArtplayer(streamUrl) {
    art = new Artplayer({
        container: '.artplayer-app',
        url: streamUrl,
        type: 'm3u8',
        autoplay: true,
        fullscreen: true,
        isLive: true,
        theme: '#e53935',
        customType: {
            m3u8: function (video, url, art) {
                if (Hls.isSupported()) {
                    if (art.hls) art.hls.destroy();
                    const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); art.hls = hls;
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        let levels = hls.levels.map((l, i) => ({ default: false, html: l.height + 'p', index: i }));
                        levels.unshift({ default: true, html: 'Auto', index: -1 });
                        art.controls.update({
                            name: 'quality', index: 10, position: 'right', html: 'Quality',
                            selector: levels, onSelect: function (item) { hls.currentLevel = item.index; return item.html; }
                        });
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; }
            }
        },
        layers: [
            {
                name: 'username-watermark',
                html: `<div style="font-family: monospace; font-size: 14px; font-weight: bold; color: rgba(255, 255, 255, 0.4); text-transform: uppercase;">AUTH: ${providedUser}</div>`,
                style: { position: 'absolute', bottom: '50px', left: '20px', zIndex: '20', pointerEvents: 'none' }
            }
        ],
    });
}
</script>
</body>
</html>
